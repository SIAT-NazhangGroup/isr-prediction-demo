name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Sync to HF Hub
        uses: huggingface/hub-sync@v0.2.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: SIAT-NazhangGroup/isr-prediction-demo
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: streamlit
          private: false
