name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install huggingface_hub
        run: pip install -U "huggingface_hub"
      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          REPO = "SIAT-NazhangGroup/isr-prediction-demo"
          api = HfApi(token=os.environ["HF_TOKEN"])

          # The Space was created on huggingface.co (SDK=streamlit).
          # exist_ok=True reuses it without re-specifying the SDK, which
          # avoids the hf-CLI "space-sdk must be gradio|docker|static" regression.
          api.create_repo(repo_id=REPO, repo_type="space", exist_ok=True)

          api.upload_folder(
              repo_id=REPO,
              repo_type="space",
              folder_path=".",
              ignore_patterns=[
                  "**/.git*",
                  "**/.github*",
                  "**/__pycache__",
                  "**/*.pyc",
                  "HF_PUSH_GUIDE.md",
                  "test_headless.py",
              ],
          )
          print("Synced to https://huggingface.co/spaces/" + REPO)
          PY
